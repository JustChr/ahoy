<!doctype html>
<html>
    <head>
        <title>Update</title>
        {#HTML_HEADER}
    </head>
    <body>
        {#HTML_NAV}
        <div id="wrapper">
            <div id="content">
                <fieldset>
                    <legend class="des">{#SELECT_FILE} (*.bin)</legend>
                    <p>{#INSTALLED_VERSION}:<br/><span id="version" style="background-color: var(--input-bg); padding: 7px; display: block; margin: 3px;"></span></p>
                    <form id="form" method="POST" action="/update" enctype="multipart/form-data" accept-charset="utf-8">
                        <input type="file" id="uploadFileInput" name="update">
                        <input type="button" id="uploadButton" class="btn my-4" value="{#BTN_UPDATE}" onclick="hide()">
                    </form>
                </fieldset>
                <div class="row mt-4">
                    <a href="https://github.com/JustChr/ahoy/releases/latest" target="_blank">{#DOWNLOADS}</a>
                </div>
            </div>
        </div>
        {#HTML_FOOTER}
        <script type="text/javascript">
            document.addEventListener('DOMContentLoaded', () => {
                const fileInput = document.querySelector('#uploadFileInput');
                const button = document.querySelector('#uploadButton');
                button.disabled = true;
                button.title = "Please select a file first";
                fileInput.addEventListener('change', () => {
                    if (fileInput.value) {
                        button.disabled = false;
                        button.title = "";
                    } else {
                        button.disabled = true;
                        button.title = "Please select a file first";
                    }
                });
            });

            var env;
            function parseGeneric(obj) {
                parseNav(obj)
                parseESP(obj)
                parseRssi(obj)
                parseTitle(obj)
                env = obj.env
                document.getElementById("version").innerHTML = "{#VERSION_FULL}_" + obj.env + ".bin"
            }

            function hide() {
                let fw = document.getElementsByName("update")[0].value
                // be tolerant of filenames that don't follow the CI naming scheme
                let parts = fw.split("_")
                let bin = (env && fw.length >= env.length + 4) ? fw.slice(-env.length-4, -4) : ""
                let ver = (parts.length > 2) ? parts[2].split(".") : null

                if (ver && ver[1] == "9") {
                    var html = ml("div", {class: "row"}, [
                        ml("div", {class: "row my-3"}, "{#ERROR_UPGRADE_NOT_POSSIBLE}"),
                        ml("div", {class: "row"}, [
                            ml("div", {class: "col-6"}, ml("input", {type: "button", class: "btn", value: "{#CANCEL}", onclick: function() { modalClose(); }}, null))
                        ])
                    ])
                    modal("{#UPDATE_MODAL}", html)
                } else if (bin !== env) {
                    var html = ml("div", {class: "row"}, [
                        ml("div", {class: "row my-3"}, "{#WARN_DIFF_ENV}"),
                        ml("div", {class: "row"}, [
                            ml("div", {class: "col-6"}, ml("input", {type: "button", class: "btn", value: "{#CANCEL}", onclick: function() { modalClose(); }}, null)),
                            ml("div", {class: "col-6"}, ml("input", {type: "button", class: "btn", value: "{#CONTIUE}", onclick: function() { start(); modalClose(); }}, null))
                        ])
                    ])
                    modal("{#UPDATE_MODAL}", html)
                } else {
                    start()
                }
            }

            // MD5 of the firmware bytes, computed client-side and sent as X-MD5 so the device
            // can reject a corrupt/truncated upload (matches the curl path). SubtleCrypto has no
            // MD5, so this is the compact, well-tested blueimp MD5 core operating on raw bytes.
            function md5FromBytes(bytes) {
                function safeAdd(x, y) {
                    let lsw = (x & 0xffff) + (y & 0xffff)
                    let msw = (x >> 16) + (y >> 16) + (lsw >> 16)
                    return (msw << 16) | (lsw & 0xffff)
                }
                function rol(n, c) { return (n << c) | (n >>> (32 - c)) }
                function cmn(q, a, b, x, s, t) { return safeAdd(rol(safeAdd(safeAdd(a, q), safeAdd(x, t)), s), b) }
                function ff(a,b,c,d,x,s,t){return cmn((b & c) | (~b & d), a, b, x, s, t)}
                function gg(a,b,c,d,x,s,t){return cmn((b & d) | (c & ~d), a, b, x, s, t)}
                function hh(a,b,c,d,x,s,t){return cmn(b ^ c ^ d, a, b, x, s, t)}
                function ii(a,b,c,d,x,s,t){return cmn(c ^ (b | ~d), a, b, x, s, t)}

                let lenBits = bytes.length * 8
                // exact padded word count (multiple of 16); Int32Array is zero-filled for us
                let x = new Int32Array((((lenBits + 64) >>> 9) << 4) + 16)
                for (let i = 0; i < bytes.length; i++)
                    x[i >> 2] |= bytes[i] << ((i % 4) * 8)
                x[lenBits >> 5] |= 0x80 << (lenBits % 32)
                x[(((lenBits + 64) >>> 9) << 4) + 14] = lenBits

                let a = 1732584193, b = -271733879, c = -1732584194, d = 271733878
                for (let i = 0; i < x.length; i += 16) {
                    let oa = a, ob = b, oc = c, od = d
                    a=ff(a,b,c,d,x[i],7,-680876936);    d=ff(d,a,b,c,x[i+1],12,-389564586)
                    c=ff(c,d,a,b,x[i+2],17,606105819);  b=ff(b,c,d,a,x[i+3],22,-1044525330)
                    a=ff(a,b,c,d,x[i+4],7,-176418897);  d=ff(d,a,b,c,x[i+5],12,1200080426)
                    c=ff(c,d,a,b,x[i+6],17,-1473231341);b=ff(b,c,d,a,x[i+7],22,-45705983)
                    a=ff(a,b,c,d,x[i+8],7,1770035416);  d=ff(d,a,b,c,x[i+9],12,-1958414417)
                    c=ff(c,d,a,b,x[i+10],17,-42063);    b=ff(b,c,d,a,x[i+11],22,-1990404162)
                    a=ff(a,b,c,d,x[i+12],7,1804603682); d=ff(d,a,b,c,x[i+13],12,-40341101)
                    c=ff(c,d,a,b,x[i+14],17,-1502002290);b=ff(b,c,d,a,x[i+15],22,1236535329)
                    a=gg(a,b,c,d,x[i+1],5,-165796510);  d=gg(d,a,b,c,x[i+6],9,-1069501632)
                    c=gg(c,d,a,b,x[i+11],14,643717713); b=gg(b,c,d,a,x[i],20,-373897302)
                    a=gg(a,b,c,d,x[i+5],5,-701558691);  d=gg(d,a,b,c,x[i+10],9,38016083)
                    c=gg(c,d,a,b,x[i+15],14,-660478335);b=gg(b,c,d,a,x[i+4],20,-405537848)
                    a=gg(a,b,c,d,x[i+9],5,568446438);   d=gg(d,a,b,c,x[i+14],9,-1019803690)
                    c=gg(c,d,a,b,x[i+3],14,-187363961); b=gg(b,c,d,a,x[i+8],20,1163531501)
                    a=gg(a,b,c,d,x[i+13],5,-1444681467);d=gg(d,a,b,c,x[i+2],9,-51403784)
                    c=gg(c,d,a,b,x[i+7],14,1735328473); b=gg(b,c,d,a,x[i+12],20,-1926607734)
                    a=hh(a,b,c,d,x[i+5],4,-378558);     d=hh(d,a,b,c,x[i+8],11,-2022574463)
                    c=hh(c,d,a,b,x[i+11],16,1839030562);b=hh(b,c,d,a,x[i+14],23,-35309556)
                    a=hh(a,b,c,d,x[i+1],4,-1530992060); d=hh(d,a,b,c,x[i+4],11,1272893353)
                    c=hh(c,d,a,b,x[i+7],16,-155497632); b=hh(b,c,d,a,x[i+10],23,-1094730640)
                    a=hh(a,b,c,d,x[i+13],4,681279174);  d=hh(d,a,b,c,x[i],11,-358537222)
                    c=hh(c,d,a,b,x[i+3],16,-722521979); b=hh(b,c,d,a,x[i+6],23,76029189)
                    a=hh(a,b,c,d,x[i+9],4,-640364487);  d=hh(d,a,b,c,x[i+12],11,-421815835)
                    c=hh(c,d,a,b,x[i+15],16,530742520); b=hh(b,c,d,a,x[i+2],23,-995338651)
                    a=ii(a,b,c,d,x[i],6,-198630844);    d=ii(d,a,b,c,x[i+7],10,1126891415)
                    c=ii(c,d,a,b,x[i+14],15,-1416354905);b=ii(b,c,d,a,x[i+5],21,-57434055)
                    a=ii(a,b,c,d,x[i+12],6,1700485571); d=ii(d,a,b,c,x[i+3],10,-1894986606)
                    c=ii(c,d,a,b,x[i+10],15,-1051523);  b=ii(b,c,d,a,x[i+1],21,-2054922799)
                    a=ii(a,b,c,d,x[i+8],6,1873313359);  d=ii(d,a,b,c,x[i+15],10,-30611744)
                    c=ii(c,d,a,b,x[i+6],15,-1560198380);b=ii(b,c,d,a,x[i+13],21,1309151649)
                    a=ii(a,b,c,d,x[i+4],6,-145523070);  d=ii(d,a,b,c,x[i+11],10,-1120210379)
                    c=ii(c,d,a,b,x[i+2],15,718787259);  b=ii(b,c,d,a,x[i+9],21,-343485551)
                    a=safeAdd(a,oa); b=safeAdd(b,ob); c=safeAdd(c,oc); d=safeAdd(d,od)
                }
                let hex = "0123456789abcdef", out = ""
                for (let w of [a, b, c, d])
                    for (let s = 0; s < 32; s += 8) {
                        let byteVal = (w >>> s) & 0xff
                        out += hex[(byteVal >> 4) & 0xf] + hex[byteVal & 0xf]
                    }
                return out
            }

            // upload via XHR so the form stays in the DOM during the transfer
            // (replacing it mid-submit aborts the upload), show progress and surface errors
            function start() {
                let fileInput = document.getElementsByName("update")[0]
                let content = document.getElementById("content")
                if (!fileInput.files || !fileInput.files[0])
                    return

                let file = fileInput.files[0]
                let label = span("{#UPDATE_STARTED}")
                content.replaceChildren(label)

                // read the file once to compute its MD5, then upload with X-MD5 set for
                // end-to-end integrity. If hashing fails for any reason, fall back to uploading
                // without it (device still size-checks) rather than blocking the update.
                let reader = new FileReader()
                reader.onload = function() {
                    let md5 = null
                    try { md5 = md5FromBytes(new Uint8Array(reader.result)) } catch (e) { md5 = null }
                    send(file, content, label, md5)
                }
                reader.onerror = function() { send(file, content, label, null) }
                reader.readAsArrayBuffer(file)
            }

            function send(file, content, label, md5) {
                let fd = new FormData()
                fd.append("update", file)

                let xhr = new XMLHttpRequest()
                let uploaded = false
                xhr.open("POST", "/update")
                if (md5)
                    xhr.setRequestHeader("X-MD5", md5)
                xhr.upload.addEventListener("progress", function(e) {
                    if (e.lengthComputable)
                        label.textContent = "{#UPDATE_STARTED} (" + Math.round(e.loaded / e.total * 100) + "%)"
                })
                // fires once all bytes are sent; the device then reboots and drops the
                // socket, so a following 'error' still means success
                xhr.upload.addEventListener("load", function() { uploaded = true })

                let finish = function(ok) {
                    if (ok) {
                        label.textContent = "{#UPDATE_STARTED}"
                        setTimeout(function() { window.location.href = "/" }, 20000)
                    } else
                        content.replaceChildren(span("Update failed - still running the previous firmware. Please retry."))
                }
                // the device answers 200 only when the image finalized and it will reboot; a
                // 5xx (or pre-flight refusal) means it stayed on the old firmware -> show failed.
                xhr.addEventListener("load", function() { finish(xhr.status >= 200 && xhr.status < 300) })
                // a dropped socket after all bytes were sent = the device rebooted into the new
                // image (success); a drop before that is a real error.
                xhr.addEventListener("error", function() { finish(uploaded) })
                xhr.addEventListener("timeout", function() { finish(uploaded) })

                xhr.send(fd)
            }

            getAjax("/api/generic", parseGeneric);
        </script>
    </body>
</html>
