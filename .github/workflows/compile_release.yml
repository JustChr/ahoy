name: Ahoy Release

on:
  push:
    branches:
    - main
    paths-ignore:
    - '**.md' # Do no build on *.md changes
    - '**.yaml' # e.g. issue report

jobs:
  build:
    name: Build (EN)
    runs-on: ubuntu-latest
    # only run on this fork's main branch (skips on further forks)
    if: github.repository == 'JustChr/ahoy' && github.ref_name == 'main'
    continue-on-error: false
    strategy:
      matrix:
        variant:
          - esp8266
    steps:
    - uses: actions/checkout@v4
    - uses: benjlevesque/short-sha@v3.0
      id: short-sha
      with:
        length: 7

    - name: Cache Pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install PlatformIO
      run: |
        python -m pip install setuptools --upgrade pip
        pip install --upgrade platformio

    - name: Run PlatformIO
      run:  pio run -d src -e ${{ matrix.variant }}

    - name: Compress .elf
      uses: edgarrc/action-7z@v1
      with:
        args: 7z a -t7z -mx=9 src/.pio/build/${{ matrix.variant }}/firmware.elf.7z ./src/.pio/build/${{ matrix.variant }}/firmware.elf

    - name: Rename Firmware
      env:
        SHA: ${{ steps.short-sha.outputs.sha }}
      run: python scripts/getVersion.py ${{ matrix.variant }} >> $GITHUB_OUTPUT

    - name: Create Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.variant }}
        path: firmware/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Get Artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true
        path: firmware

    - name: Get Version from code
      id: version_name
      run: python scripts/getVersion.py >> $GITHUB_OUTPUT

    - name: Create tag
      uses: actions/github-script@v7
      with:
        script: |
          try {
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.version_name.outputs.name }}',
              sha: context.sha
            })
          } catch (e) {
            // tag already exists (e.g. push to main without a version bump) -> don't fail the run
            if (e.status === 422) { core.info('tag already exists, skipping tag creation') }
            else { throw e }
          }

    - name: Set Version
      uses: cschleiden/replace-tokens@v1
      with:
        files: manual/User_Manual.md
      env:
          VERSION: ${{ steps.version_name.outputs.name }}

    - name: Rename firmware directory
      run: mv firmware ${{ steps.version_name.outputs.name }}

    - name: Zip release
      uses: vimtor/action-zip@v1.2
      with:
        files: ${{ steps.version_name.outputs.name }} manual/User_Manual.md manual/Getting_Started.md
        dest: '${{ steps.version_name.outputs.name }}.zip'

    - name: Publish Release
      uses: ncipollo/release-action@v1
      with:
        artifactErrorsFailBuild: true
        skipIfReleaseExists: true
        bodyFile: src/CHANGES.md
        artifacts: '${{ steps.version_name.outputs.name }}.zip'
        tag: ${{ steps.version_name.outputs.name }}
        name: ${{ steps.version_name.outputs.name }}
        token: ${{ secrets.GITHUB_TOKEN }}
